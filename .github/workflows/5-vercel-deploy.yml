name: "🚀 Deploy to Vercel (Production + Preview)"
# Requires secrets: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
# Skips gracefully if secrets not yet configured.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  deployments: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Security audit
        run: pnpm audit --audit-level=high || true

      - name: Check Vercel secrets are configured
        id: vercel_ready
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::notice::Vercel secrets not configured — deploy skipped. Add VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID to repo secrets."
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

      - name: Install Vercel CLI
        if: steps.vercel_ready.outputs.ready == 'true'
        run: pnpm add -g vercel@latest

      - name: Pull Vercel environment
        if: steps.vercel_ready.outputs.ready == 'true'
        run: vercel pull --yes --environment=${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        if: steps.vercel_ready.outputs.ready == 'true'
        run: vercel build ${{ github.ref == 'refs/heads/main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        if: steps.vercel_ready.outputs.ready == 'true'
        id: deploy
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            DEPLOY_URL=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          else
            DEPLOY_URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          fi
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
          echo "Deployed: $DEPLOY_URL"

      - name: Comment preview URL on PR
        if: steps.vercel_ready.outputs.ready == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.deploy.outputs.url }}';
            const sha = context.sha.slice(0, 7);
            const body = [
              '## 🚀 Vercel Preview Deployment',
              `| Preview | ${url} |`,
              `|---|---|`,
              `| Commit | \`${sha}\` |`,
              '- [ ] Test AI model integrations',
              '- [ ] Check MCP tool calls',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number, body,
            });

      - name: Mark production deployed
        if: steps.vercel_ready.outputs.ready == 'true' && github.ref == 'refs/heads/main'
        run: |
          echo "## 🚀 Deployed to ${{ steps.deploy.outputs.url }}" >> $GITHUB_STEP_SUMMARY