name: "🔍 CI — Type Check + Lint + Build"
# WHY: Next.js 15 + TypeScript + pnpm stack. Catches breaks before they hit prod.
# Runs on every PR and push to main/dev branches.

on:
  push:
    branches: [main, dev, "feature/**", "sync/**"]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0  # matches packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit
        continue-on-error: false

      - name: ESLint
        run: pnpm lint
        continue-on-error: true  # warn, don't block

      - name: Build
        run: pnpm build
        env:
          # Required env stubs for build (no real keys needed for type-check build)
          NEXT_PUBLIC_APP_URL: "https://example.com"
          DATABASE_URL: "postgresql://user:pass@host/db"
          ANTHROPIC_API_KEY: "sk-ant-stub"
          OPENAI_API_KEY: "sk-stub"
          XAI_API_KEY: "stub"
          GROQ_API_KEY: "stub"
          UPSTASH_REDIS_REST_URL: "https://stub.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "stub"
          TAVILY_API_KEY: "stub"
          EXA_API_KEY: "stub"
          PERPLEXITY_API_KEY: "pplx-stub"
          VALYU_API_KEY: "stub"
          PARALLEL_API_KEY: "stub"
          OPENWEATHER_API_KEY: "stub"
          GOOGLE_MAPS_API_KEY: "stub"
          AMADEUS_API_KEY: "stub"
          AMADEUS_API_SECRET: "stub"
          CRON_SECRET: "stub"
          BLOB_READ_WRITE_TOKEN: "stub"
          MEM0_API_KEY: "stub"
          MEM0_ORG_ID: "stub"
          MEM0_PROJECT_ID: "stub"
          SMITHERY_API_KEY: "stub"
          COINGECKO_API_KEY: "stub"
          QSTASH_TOKEN: "stub"
          RESEND_API_KEY: "stub"
          TMDB_API_KEY: "stub"
          YT_ENDPOINT: "https://stub.endpoint"
          ELEVENLABS_API_KEY: "stub"
          REDIS_URL: "redis://stub:6379"
          FIRECRAWL_API_KEY: "stub"

      - name: Build size report
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          du -sh .next/ 2>/dev/null || echo "Build dir not found"
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
