name: "⬆️ Sync Upstream (Scira)"
# WHY: zaidmukaddam/scira is the source repo (11.6k stars, active dev).
# Runs every Monday. Auto-creates PR with new Scira features, model integrations, MCPs.

on:
  schedule:
    - cron: "0 6 * * 1"   # Monday 6am UTC
  workflow_dispatch:
    inputs:
      force:
        description: "Force sync even if up to date"
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream + fetch
        run: |
          git remote add upstream https://github.com/zaidmukaddam/scira.git || true
          git fetch upstream main

      - name: Measure delta
        id: delta
        run: |
          BEHIND=$(git rev-list HEAD..upstream/main --count 2>/dev/null || echo 0)
          COMMITS=$(git log upstream/main ^HEAD --oneline --no-merges | head -20)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "commits<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          echo "Upstream is $BEHIND commits ahead"

      - name: Create sync branch + merge
        if: steps.delta.outputs.behind != '0' || github.event.inputs.force == 'true'
        run: |
          BRANCH="sync/upstream-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b $BRANCH
          # Merge upstream, resolve conflicts by preferring upstream
          git merge upstream/main --no-edit -m "chore: sync upstream scira $(date +%Y-%m-%d)" || \
            (git diff --name-only --diff-filter=U | xargs git checkout --theirs && \
             git add . && git commit -m "chore: sync upstream (auto-resolved conflicts)")
          git push origin $BRANCH
          echo "SYNC_BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Open PR
        if: steps.delta.outputs.behind != '0' || github.event.inputs.force == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const branch = process.env.SYNC_BRANCH;
            const behind = '${{ steps.delta.outputs.behind }}';
            const commits = `${{ steps.delta.outputs.commits }}`;
            try {
              const { data: pr } = await github.rest.pulls.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `⬆️ Sync upstream: ${behind} new commits from scira`,
                head: branch,
                base: 'main',
                body: [
                  '## 🔄 Upstream Sync — ' + new Date().toDateString(),
                  '',
                  `**${behind} new commits** from [zaidmukaddam/scira](https://github.com/zaidmukaddam/scira)`,
                  '',
                  '### Recent upstream changes',
                  '```',
                  commits,
                  '```',
                  '',
                  '### Review checklist before merging',
                  '- [ ] New AI model providers (check `ai/` integrations)',
                  '- [ ] New MCP tool integrations',
                  '- [ ] New `.env` vars required (check `.env.example`)',
                  '- [ ] DB schema changes (Drizzle migrations)',
                  '- [ ] pnpm lockfile conflicts',
                  '- [ ] Breaking API route changes (`app/api/`)',
                  '',
                  '_Auto-generated by upstream-sync workflow_'
                ].join('\n')
              });
              console.log('PR created:', pr.html_url);
            } catch(e) {
              console.log('PR may already exist:', e.message);
            }

      - name: Already current
        if: steps.delta.outputs.behind == '0' && github.event.inputs.force != 'true'
        run: echo "✅ Fork is current with upstream. Nothing to sync."
